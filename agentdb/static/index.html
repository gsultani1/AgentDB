<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentDB</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <button class="hamburger" id="hamburger-btn" aria-label="Menu">&#9776;</button>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <nav id="sidebar">
    <div class="logo">AgentDB</div>

    <a href="#dashboard" data-view="dashboard"><span class="icon">&#9632;</span><span class="label">Dashboard</span></a>

    <div class="nav-section">Memory</div>
    <a href="#memories" data-view="memories"><span class="icon">&#9733;</span><span class="label">Memories</span></a>
    <a href="#mindmap" data-view="mindmap"><span class="icon">&#10040;</span><span class="label">Mind Map</span></a>

    <div class="nav-section">AI</div>
    <a href="#chat" data-view="chat"><span class="icon">&#9993;</span><span class="label">Chat Console</span></a>
    <a href="#dbconsole" data-view="dbconsole"><span class="icon">&#9107;</span><span class="label">DB Console</span></a>

    <div class="nav-section">Authoring</div>
    <a href="#editor" data-view="editor"><span class="icon">&#9998;</span><span class="label">Markdown</span></a>
    <a href="#skills" data-view="skills"><span class="icon">&#9881;</span><span class="label">Skills</span></a>

    <div class="nav-section">System</div>
    <a href="#scheduler" data-view="scheduler"><span class="icon">&#9200;</span><span class="label">Scheduler</span></a>
    <a href="#feedback" data-view="feedback"><span class="icon">&#10003;</span><span class="label">Feedback</span></a>
    <a href="#notifications" data-view="notifications"><span class="icon">&#9888;</span><span class="label">Notifications</span> <span id="notif-badge" style="background:var(--red);color:#fff;font-size:10px;padding:1px 6px;border-radius:8px;display:none"></span></a>
    <a href="#import" data-view="import"><span class="icon">&#8679;</span><span class="label">Import</span></a>
    <a href="#audit" data-view="audit"><span class="icon">&#9776;</span><span class="label">Audit Log</span></a>

    <div class="nav-section">Integration</div>
    <a href="#connect" data-view="connect"><span class="icon">&#9889;</span><span class="label">Connect</span></a>
    <a href="#mcp" data-view="mcp"><span class="icon">&#9881;</span><span class="label">MCP</span></a>

    <div style="flex:1"></div>
    <a href="#settings" data-view="settings" style="border-top:1px solid var(--border)"><span class="icon">&#9881;</span><span class="label">Settings</span></a>
  </nav>
  <script>
    document.getElementById('hamburger-btn').addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebar-overlay').classList.toggle('active');
    });
    document.getElementById('sidebar-overlay').addEventListener('click', function() {
      document.getElementById('sidebar').classList.remove('open');
      this.classList.remove('active');
    });
  </script>

  <main>
    <div id="view-dashboard" class="view"></div>
    <div id="view-memories" class="view"></div>
    <div id="view-mindmap" class="view"></div>
    <div id="view-chat" class="view"></div>
    <div id="view-dbconsole" class="view"></div>
    <div id="view-editor" class="view"></div>
    <div id="view-skills" class="view"></div>
    <div id="view-feedback" class="view"></div>
    <div id="view-notifications" class="view"></div>
    <div id="view-import" class="view"></div>
    <div id="view-audit" class="view"></div>
    <div id="view-connect" class="view"></div>
    <div id="view-scheduler" class="view"></div>
    <div id="view-mcp" class="view"></div>
    <div id="view-settings" class="view"></div>
  </main>

  <div id="modal-root"></div>

  <script src="/js/app.js"></script>
  <script src="/js/views/dashboard.js"></script>
  <script src="/js/views/memories.js"></script>
  <script src="/js/views/mindmap.js"></script>
  <script src="/js/views/chat.js"></script>
  <script src="/js/views/dbconsole.js"></script>
  <script src="/js/views/editor.js"></script>
  <script src="/js/views/skills.js"></script>
  <script src="/js/views/feedback.js"></script>
  <script src="/js/views/notifications.js"></script>
  <script src="/js/views/import.js"></script>
  <script src="/js/views/audit.js"></script>
  <script src="/js/views/connect.js"></script>
  <script src="/js/views/scheduler.js"></script>
  <script src="/js/views/mcp.js"></script>
  <script src="/js/views/settings.js"></script>
</body>
</html>
